services:
  - type: web
    name: asyncxy
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: "10000"
      - key: PYTHON_VERSION
        value: "3.12.0"
    plan: free
    healthCheckPath: /health
